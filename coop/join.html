<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Join the Game!</title>
<style>
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:'Baloo 2','Segoe UI',Verdana,sans-serif;text-align:center;color:#2C2440;
    background:radial-gradient(1200px 700px at 50% -5%,#FFE9A8,#FFF6E0 55%,#D2F2DB);}
  h1{font-size:3rem;margin:0 0 4px;color:#1a1456;}
  .sub{font-size:1.3rem;color:#7A6A4F;font-weight:700;margin-bottom:28px;}
  .card{background:#fff;border:3px solid #FFB81C;border-radius:26px;padding:30px 40px;
    box-shadow:0 20px 50px rgba(0,0,0,.18);}
  .step{font-size:1.15rem;color:#7A6A4F;font-weight:700;margin-bottom:6px;}
  #qr{width:300px;height:300px;margin:6px auto 14px;display:flex;align-items:center;justify-content:center;}
  #qr img,#qr canvas{border-radius:10px;}
  .url{font-size:2rem;font-weight:800;color:#ED8B00;background:#FFF6E0;border:2px dashed #FFB81C;
    border-radius:14px;padding:12px 22px;display:inline-block;letter-spacing:.5px;}
  .hint{margin-top:18px;font-size:1rem;color:#7A6A4F;font-weight:600;}
  .teacher{position:fixed;top:14px;right:18px;}
  .teacher a{background:#1a1456;color:#FFD43B;text-decoration:none;font-weight:800;
    padding:9px 16px;border-radius:999px;font-size:.9rem;}
  .qr-fallback{font-size:.95rem;color:#9A8A6F;max-width:300px;}
</style>
</head>
<body>
  <div class="teacher"><a href="/host">👩‍🏫 Teacher dashboard →</a></div>
  <h1>🏛️ Join the World!</h1>
  <div class="sub" id="worldname">Class World</div>
  <div class="card">
    <div class="step">📷 Scan with your phone camera</div>
    <div id="qr"><div class="qr-fallback">Loading code…</div></div>
    <div class="step">…or type this into any browser on the wifi:</div>
    <div class="url" id="url">…</div>
  </div>
  <div class="hint">Everyone on the same wifi plays in <b id="wn2">this world</b> together.</div>

<script>
  var origin = window.location.origin;        // e.g. http://192.168.1.42:3000
  document.getElementById('url').textContent = origin;

  // pull the world name
  fetch('/__coop/state').then(function(r){return r.json();}).then(function(d){
    if(d && d.world){ document.getElementById('worldname').textContent=d.world;
      document.getElementById('wn2').textContent=d.world; }
  }).catch(function(){});

  // QR code: try a tiny library from CDN; if offline, the typed URL still works.
  function makeQR(){
    try{
      document.getElementById('qr').innerHTML='';
      new QRCode(document.getElementById('qr'), { text: origin, width: 300, height: 300,
        colorDark:'#1a1456', colorLight:'#ffffff', correctLevel: QRCode.CorrectLevel.M });
    }catch(e){ qrFail(); }
  }
  function qrFail(){
    document.getElementById('qr').innerHTML='<div class="qr-fallback">📵 No QR code (offline), just type the link below into a browser.</div>';
  }
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
  s.onload=makeQR; s.onerror=qrFail;
  document.head.appendChild(s);
</script>
</body>
</html>
